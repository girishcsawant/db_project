# This is a Databricks asset bundle definition for db_project.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: db_project
  uuid: 0c931c0c-e22f-47e8-be33-c179df255343

include:
  - resources/*.yml
  - resources/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-2c978234-9bc6.cloud.databricks.com
    variables:
      catalog: db_catalog
      schema: dev
  prod:
    mode: production
    workspace:
      host: https://dbc-2c978234-9bc6.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/girish.csawant@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/girish.csawant@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: db_catalog
      schema: prod
    permissions:
      - user_name: girish.csawant@gmail.com
        level: CAN_MANAGE
